<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard</title>
    <link rel="icon" href="images/stackbit.svg">
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div id="header">
        <div id="logoHeader" class="logo">
            <img src="images/stackbit.svg" alt="logo" class="logo-image">
            <h3>Crypto Dashboard</h3>
        </div>
        <div id="searchDiv">
            <input type="text" id="searchInput" placeholder="Search">
            <button id="searchButton">🔍</button>
        </div>
    </div>

    <div id="cryptoDataContainer">
        <div id="cryptoDataLoadingState"></div>
        <table id="cryptoDataTable">
            <thead id="cryptoDataHeader">
                <tr id="cryptoHeaderRow">
                    <th>#</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>24h</th>
                </tr>
            </thead>
            <tbody id="cryptoDataBody"></tbody>
        </table>
    </div>

</body>
</html>
