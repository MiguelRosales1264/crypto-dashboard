<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard</title>
    <link rel="icon" href="images/stackbit.svg">
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body>
    <header id="headerContainer">
        <div id="header">
            <div id="logoHeader" class="logo">
                <img src="images/stackbit.svg" alt="logo" class="logo-image">
                <h3>Crypto Dashboard</h3>
            </div>

            <div id="countdownContainer">
                <div class="time-box">
                    <span id="countdownSeconds">60</span>
                    <small>Seconds</small>
                </div>
            </div>
            
            <div id="searchDiv">
                <input type="text" id="searchInput" placeholder="Search">
                <button id="searchButton">🔍</button>
            </div>
        </div>
    </header>

    <main id="mainContainer">
        <div id="cryptoDataContainer">
            <div id="cryptoDataLoadingDiv" style="display: none;"></div>
            <div id="cryptoDataErrorDiv" style="display: none;"></div>

            <table id="cryptoDataTable">
                <thead id="cryptoDataHeader">
                    <tr id="cryptoHeaderRow">
                        <th class="crypto-index">#</th>
                        <th class="crypto-name">Name</th>
                        <th class="crypto-price">Price</th>
                        <th class="crypto-change">24h</th>
                    </tr>
                </thead>
                <tbody id="cryptoDataBody"></tbody>
            </table>

            <div id="pageButtonsContainer">
                <div id="cryptoPageInfo">
                    <p id="pageIndex">Showing 1 to 100 of 16039 results</p>
                </div>

                <div id="cryptoPageButtons">
                    <button id="prevBtn" class="button">Prev</button>
                    <button id="nextBtn" class="button">Next</button>
                </div>

                <div id="cryptoPageInfo">
                    <button id="returnToTop" class="button" onclick="setCurrentPage(1)">Return to top</button>
                </div>
            </div>
        </div>

        <div id="coinPagesContainer" style="display: none;">
    </main>
</body>
</html>
