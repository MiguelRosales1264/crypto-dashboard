<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard</title>
    <link rel="icon" href="images/stackbit.svg">
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body>
    <header id="headerContainer">
        <div id="header">
            <div id="logoHeader" class="logo">
                <img src="images/stackbit.svg" alt="logo" class="logo-image">
                <h3>Crypto Dashboard</h3>
            </div>
            <div id="searchDiv">
                <input type="text" id="searchInput" placeholder="Search">
                <button id="searchButton">🔍</button>
            </div>
        </div>
    </header>
    <main id="mainContainer">
        <div id="cryptoDataWrapper">
            <div id="cryptoDataContainer">
                <div id="cryptoDataLoadingDiv"></div>
                <div id="cryptoDataErrorDiv"></div>
                <table id="cryptoDataTable">
                    <thead id="cryptoDataHeader">
                        <tr id="cryptoHeaderRow">
                            <th>#</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>24h</th>
                        </tr>
                    </thead>
                    <tbody id="cryptoDataBody"></tbody>
                </table>
            </div>
            <div>
                <button>Prev</button>
                <button>Next</button>
            </div>
        </div>
        <div id="coinPagesContainer" style="display: none;">
        <!-- <h1>Coin Page</h1>
            <div>
                <img src="${image}" alt="${name} logo" class="crypto-image">
                <h3>${name} ${symbol.toUpperCase()} Price ${index + 1}</h3>
            </div>
            <h1>$${current_price.toLocaleString()}</h1>
            <p class='crypto-change price-change-24h'>${price_change_percentage_24h.toFixed(1)} (24h)</p> -->
        </div>
    </main>
</body>
</html>
